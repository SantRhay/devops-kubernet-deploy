
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-web
  template:
    metadata:
      labels:
        app: devops-web
    spec:
      containers:
      - name: devops-web
        image: nginx
        ports:
        - containerPort: 80
