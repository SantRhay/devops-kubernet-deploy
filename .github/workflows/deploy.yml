name: DevOps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t santrhay/devops-nginx-app:${{ github.sha }} -f docker/Dockerfile .

    - name: Push Docker image
      run: |
        docker push santrhay/devops-nginx-app:${{ github.sha }}
        docker tag santrhay/devops-nginx-app:${{ github.sha }} santrhay/devops-nginx-app:latest
        docker push santrhay/devops-nginx-app:latest

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml