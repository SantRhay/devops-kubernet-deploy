name: Deploy Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Deploy na EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 54.167.212.215
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd devops-kubernet-deploy
            git pull
            sudo k3s kubectl apply -f k8s/
